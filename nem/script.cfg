alias q        "quit"
alias r        "retry"
alias rs       "mp_restartgame 1"
alias s        "status"
alias nc       "noclip"
alias dbg      "clear; exec nem/debug.cfg"     // Dumps extensive debug information to console and saves it to a file if possible
alias debug    "clear; exec nem/debug.cfg"


